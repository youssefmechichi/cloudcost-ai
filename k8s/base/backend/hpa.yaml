apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: cloudcost-ai-backend-hpa

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloudcost-ai-backend

  minReplicas: 2
  maxReplicas: 5

  metrics:
    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 70