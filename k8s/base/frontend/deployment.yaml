apiVersion : apps/v1
kind : Deployment
metadata:
  name: cloudcost-ai-frontend
spec:
  replicas : 2
  selector: 
    matchLabels:
      app: cloudcost-ai-frontend
  template:
    metadata:
      labels:
        app: cloudcost-ai-frontend
    spec:
      containers:
      - name: cloudcost-ai-frontend
        image: youssefcloudcostaidev.azurecr.io/cloudcost-ai-frontend:bootstrap
        ports:
        - containerPort: 3001
        resources:
        requests:
          cpu: "50m"
          memory: "128Mi"

        limits:
          cpu: "250m"
          memory: "256Mi"
        
