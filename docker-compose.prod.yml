version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cloudcost-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cloudcost_ai

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend

    container_name: cloudcost-backend

    env_file:
      - ./backend/.env

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "3000:3000"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s  

  frontend:
    build:
      context: ./frontend

    container_name: cloudcost-frontend

    env_file:
      - ./frontend/.env.local

    depends_on:
        backend:
          condition: service_healthy

    ports:
      - "3001:3001"

volumes:
  postgres_data: