name: CloudCost AI - Continuous Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  ACR_NAME: cloudcostaidev
  REGISTRY: youssefcloudcostaidev.azurecr.io

  BACKEND_IMAGE: cloudcost-ai-backend
  FRONTEND_IMAGE: cloudcost-ai-frontend


jobs:

  build-and-push:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    name: Build and Push Images
    runs-on: ubuntu-latest


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}


      - name: Generate image tag
        id: vars
        run: |
          echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT


      - name: Build backend image
        run: |
          docker build -t $REGISTRY/$BACKEND_IMAGE:${{ steps.vars.outputs.TAG }} ./backend


      - name: Build frontend image
        run: |
          docker build -t $REGISTRY/$FRONTEND_IMAGE:${{ steps.vars.outputs.TAG }} ./frontend


      - name: Push backend image
        run: |
          docker push $REGISTRY/$BACKEND_IMAGE:${{ steps.vars.outputs.TAG }}


      - name: Push frontend image
        run: |
          docker push $REGISTRY/$FRONTEND_IMAGE:${{ steps.vars.outputs.TAG }}

      - name: Update Kustomize image tags
        run: |
          sed -i "s/newTag: .*/newTag: ${{ steps.vars.outputs.TAG }}/" k8s/overlays/dev/kustomization.yaml

      - name: Commit updated Kustomize manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/overlays/dev/kustomization.yaml

          git diff --cached --quiet || git commit -m "ci: update image tag to ${{ steps.vars.outputs.TAG }} [skip ci]"

          git push origin HEAD:main

      - name: Display deployed version
        run: |
          echo "Backend image:"
          echo "$REGISTRY/$BACKEND_IMAGE:${{ steps.vars.outputs.TAG }}"

          echo "Frontend image:"
          echo "$REGISTRY/$FRONTEND_IMAGE:${{ steps.vars.outputs.TAG }}"