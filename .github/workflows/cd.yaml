name: CloudCost AI - Continuous Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  ACR_NAME: cloudcostaiyoussefdev
  REGISTRY: cloudcostaiyoussefdev.azurecr.io

  BACKEND_IMAGE: cloudcost-ai-backend
  FRONTEND_IMAGE: cloudcost-ai-frontend


jobs:

  build-and-push:

    name: Build and Push Images
    runs-on: ubuntu-latest


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}


      - name: Generate image tag
        id: vars
        run: |
          echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT


      - name: Build backend image
        run: |
          docker build -t $REGISTRY/$BACKEND_IMAGE:${{ steps.vars.outputs.TAG }} ./backend


      - name: Build frontend image
        run: |
          docker build -t $REGISTRY/$FRONTEND_IMAGE:${{ steps.vars.outputs.TAG }} ./frontend


      - name: Push backend image
        run: |
          docker push $REGISTRY/$BACKEND_IMAGE:${{ steps.vars.outputs.TAG }}


      - name: Push frontend image
        run: |
          docker push $REGISTRY/$FRONTEND_IMAGE:${{ steps.vars.outputs.TAG }}

      - name: Display deployed version
        run: |
          echo "Backend image:"
          echo "$REGISTRY/$BACKEND_IMAGE:${{ steps.vars.outputs.TAG }}"

          echo "Frontend image:"
          echo "$REGISTRY/$FRONTEND_IMAGE:${{ steps.vars.outputs.TAG }}"